# 최신 도커에서는 version 표기를 생략하는 것이 권장됩니다 (경고 제거)
services:
  backend:
    build:
      context: ./backend      # 빌드 컨텍스트: Dockerfile이 있는 폴더 위치
      dockerfile: Dockerfile
    ports:
      - "8000:8000"           # [내 컴퓨터 포트]:[컨테이너 내부 포트] 연결
    env_file:
      - ./backend/.env        # Gemini API KEY 등 환경변수 로드
    volumes:
      # [내 컴퓨터 폴더]:[컨테이너 내부 폴더]
      # /app/backend로 매칭하여 컨테이너 안에서도 app.main 구조를 유지하게 합니다.
      - ./backend:/app/backend 
    restart: always           # 에러 발생 시 자동으로 재시작하여 서비스 가용성 유지